name: Mirroring

on: [push, delete]

jobs:
  to_epitech:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            git@github.com:EpitechPGE1-2025/G-AIA-200-STG-2-1-cuddle-1.git
          ssh_private_key: 
            ${{ secrets.GIT_SSH_PRIVATE_KEY }}
